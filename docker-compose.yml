networks:
  otel-net:
    driver: bridge

volumes:
  redpanda-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:

services:
  redpanda:
    image: redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - otel-net

  redpanda-init:
    image: redpandadata/redpanda:v24.3.1
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    environment:
      KAFKA_TOPIC_LOGS: ${KAFKA_TOPIC_LOGS:-otel-logs}
      KAFKA_TOPIC_METRICS: ${KAFKA_TOPIC_METRICS:-otel-metrics}
      KAFKA_TOPIC_TRACES: ${KAFKA_TOPIC_TRACES:-otel-traces}
      KAFKA_PARTITIONS: ${KAFKA_PARTITIONS:-4}
      KAFKA_RETENTION_MS: ${KAFKA_RETENTION_MS:-900000}
      KAFKA_RETENTION_BYTES: ${KAFKA_RETENTION_BYTES:-1073741824}
    command:
      - |
        rpk topic create $KAFKA_TOPIC_LOGS --brokers redpanda:9092 --partitions $KAFKA_PARTITIONS --replicas 1 \
          -c retention.ms=$KAFKA_RETENTION_MS -c retention.bytes=$KAFKA_RETENTION_BYTES || true
        rpk topic create $KAFKA_TOPIC_METRICS --brokers redpanda:9092 --partitions $KAFKA_PARTITIONS --replicas 1 \
          -c retention.ms=$KAFKA_RETENTION_MS -c retention.bytes=$KAFKA_RETENTION_BYTES || true
        rpk topic create $KAFKA_TOPIC_TRACES --brokers redpanda:9092 --partitions $KAFKA_PARTITIONS --replicas 1 \
          -c retention.ms=$KAFKA_RETENTION_MS -c retention.bytes=$KAFKA_RETENTION_BYTES || true
    restart: "no"
    networks:
      - otel-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./backend-database/clickhouse-config.xml:/etc/clickhouse-server/config.d/custom.xml
      - ./backend-database/init:/docker-entrypoint-initdb.d
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - otel-net

  backend-gateway:
    build: ./backend-gateway
    ports:
      - "4317:4317"
      - "4318:4318"
    environment:
      REDPANDA_BROKERS: redpanda:9092
      KAFKA_TOPIC_LOGS: ${KAFKA_TOPIC_LOGS:-otel-logs}
      KAFKA_TOPIC_METRICS: ${KAFKA_TOPIC_METRICS:-otel-metrics}
      KAFKA_TOPIC_TRACES: ${KAFKA_TOPIC_TRACES:-otel-traces}
      OTEL_COLLECTOR_ENDPOINT: otel-collector:4317
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4318"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - otel-net

  backend-ingester:
    build: ./backend-ingester
    environment:
      REDPANDA_BROKERS: redpanda:9092
      API_BASE_URL: ${API_BASE_URL:-http://backend-api:8080}
      KAFKA_TOPIC_LOGS: ${KAFKA_TOPIC_LOGS:-otel-logs}
      KAFKA_TOPIC_METRICS: ${KAFKA_TOPIC_METRICS:-otel-metrics}
      KAFKA_TOPIC_TRACES: ${KAFKA_TOPIC_TRACES:-otel-traces}
      INGESTER_REPLICAS: ${INGESTER_REPLICAS:-1}
      OTEL_COLLECTOR_ENDPOINT: otel-collector:4317
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      backend-api:
        condition: service_started
    networks:
      - otel-net

  backend-api:
    build: ./backend-api
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_DSN: ${CLICKHOUSE_DSN:-clickhouse://clickhouse:9000/default}
      OTEL_COLLECTOR_ENDPOINT: otel-collector:4317
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - otel-net

  frontend:
    build: ./frontend
    ports:
      - "1337:1337"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://backend-api:8080}
    depends_on:
      backend-api:
        condition: service_started
    networks:
      - otel-net

  benchmark-generator:
    build: ./benchmark-generator
    command: ["--endpoint", "http://backend-gateway:4318", "--duration", "1h", "--interval", "10s"]
    depends_on:
      backend-gateway:
        condition: service_healthy
    networks:
      - otel-net
    profiles:
      - tools

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    volumes:
      - ./otel-collector/config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4319:4317"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - otel-net

  prometheus:
    image: prom/prometheus:v3.3.1
    ports:
      - "19090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=1h
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - otel-net

  grafana:
    image: grafana/grafana:13.0.2
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - otel-net
