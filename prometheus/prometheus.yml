global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['backend-gateway:9090']

  - job_name: ingester
    static_configs:
      - targets: ['backend-ingester:9093']

  - job_name: api
    static_configs:
      - targets: ['backend-api:9091']
